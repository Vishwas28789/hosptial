services:
  - type: web
    name: hospital-management-system
    env: python
    buildCommand: "pip install -r requirements.txt gunicorn"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
